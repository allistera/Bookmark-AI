<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Benchmark – Bookmark AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
      line-height: 1.5;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 22px; font-weight: 400; color: #202124; margin-bottom: 6px; }
    .page-header p  { font-size: 13px; color: #5f6368; }

    .card {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #202124;
      margin-bottom: 8px;
    }

    .form-hint { font-size: 12px; color: #5f6368; margin-bottom: 8px; }

    .input-row { display: flex; gap: 8px; }

    .form-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      color: #202124;
      background: #fff;
    }
    .form-input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.2); }

    .btn {
      padding: 9px 20px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: #1a73e8; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #1557b0; }
    .btn-secondary { background: #fff; color: #5f6368; border: 1px solid #dadce0; }
    .btn-secondary:not(:disabled):hover { background: #f8f9fa; }

    .providers-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .provider-chip {
      background: #e8f0fe;
      color: #1967d2;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .no-providers {
      font-size: 13px;
      color: #c5221f;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-info    { background: #e8f0fe; color: #1967d2; }
    .alert-error   { background: #fce8e6; color: #c5221f; }
    .alert-loading { background: #e8f0fe; color: #1967d2; }
    .alert-success { background: #e6f4ea; color: #137333; }

    .results-card {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      overflow: hidden;
    }

    .results-header {
      padding: 12px 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #dadce0;
      font-size: 13px;
      font-weight: 500;
      color: #5f6368;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5f6368;
      text-align: left;
      background: #f8f9fa;
      border-bottom: 1px solid #dadce0;
    }

    tbody tr { border-bottom: 1px solid #f1f3f4; }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 12px 16px; vertical-align: middle; }

    .model-name { font-weight: 500; color: #202124; }
    .model-sub  { font-size: 11px; color: #80868b; margin-top: 2px; }

    .folder-badge {
      font-family: 'Roboto Mono', monospace;
      font-size: 12px;
      color: #1967d2;
      background: #e8f0fe;
      padding: 3px 8px;
      border-radius: 3px;
      display: inline-block;
    }

    .latency { font-variant-numeric: tabular-nums; color: #202124; }
    .latency.fast   { color: #137333; }
    .latency.medium { color: #b06000; }
    .latency.slow   { color: #c5221f; }

    .status-running { color: #1967d2; }
    .status-done    { color: #137333; }
    .status-error   { color: #c5221f; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #1a73e8;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>Model Benchmark</h1>
      <p>Run the same URL through all your configured AI providers and compare category, latency, and content type.</p>
    </div>

    <div class="card">
      <label class="form-label" for="urlInput">URL to analyse</label>
      <div class="form-hint">Enter any URL — the AI will categorize it using each configured provider.</div>
      <div class="input-row">
        <input type="url" id="urlInput" class="form-input" placeholder="https://example.com">
        <button type="button" class="btn btn-secondary" id="useTabBtn">Use Current Tab</button>
        <button type="button" class="btn btn-primary" id="runBtn" disabled>Run Benchmark</button>
      </div>
    </div>

    <div class="card">
      <label class="form-label">Providers to test</label>
      <div id="providersList" class="providers-list">
        <span class="no-providers">Loading configured providers…</span>
      </div>
    </div>

    <div id="alertBox" style="display:none"></div>

    <div id="resultsSection" style="display:none">
      <div class="results-card">
        <div class="results-header">Results</div>
        <table>
          <thead>
            <tr>
              <th>Model</th>
              <th>Suggested Folder</th>
              <th>Content Type</th>
              <th>Latency</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="benchmark.js"></script>
</body>
</html>
