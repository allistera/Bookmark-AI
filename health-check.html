<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Health Check – Bookmark AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
      line-height: 1.5;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 400;
      color: #202124;
      margin-bottom: 6px;
    }

    .page-header p {
      font-size: 13px;
      color: #5f6368;
    }

    /* ── Progress ── */
    .progress-card {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .progress-label {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 10px;
    }

    .progress-bar-track {
      height: 6px;
      background: #e8eaed;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1a73e8;
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* ── Summary grid ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 8px;
    }

    .summary-card {
      background: #fff;
      border: 2px solid #dadce0;
      border-radius: 8px;
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .summary-card:hover {
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .summary-card.active {
      border-color: #1a73e8;
    }

    .summary-number {
      font-size: 26px;
      font-weight: 500;
      color: #202124;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .summary-label {
      font-size: 11px;
      color: #5f6368;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .summary-card.active .summary-number { color: #1a73e8; }

    .summary-card[data-filter="dead"] .summary-number,
    .summary-card[data-filter="dead"].active { color: #c5221f; }
    .summary-card[data-filter="dead"].active { border-color: #c5221f; }

    .summary-card[data-filter="domain_gone"] .summary-number,
    .summary-card[data-filter="domain_gone"].active { color: #a50e0e; }
    .summary-card[data-filter="domain_gone"].active { border-color: #a50e0e; }

    .summary-card[data-filter="redirect"] .summary-number { color: #b45309; }
    .summary-card[data-filter="redirect"].active { border-color: #b45309; color: #b45309; }

    .summary-card[data-filter="stale"] .summary-number { color: #1a73e8; }

    .summary-card[data-filter="title_changed"] .summary-number { color: #137333; }
    .summary-card[data-filter="title_changed"].active { border-color: #137333; }

    .summary-card[data-filter="ok"] .summary-number { color: #34a853; }
    .summary-card[data-filter="ok"].active { border-color: #34a853; }

    .last-run {
      font-size: 12px;
      color: #80868b;
      margin-top: 8px;
      margin-bottom: 20px;
    }

    /* ── Bulk actions ── */
    .bulk-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .bulk-bar-label {
      font-size: 12px;
      color: #5f6368;
      margin-right: 4px;
    }

    /* ── Result cards ── */
    .result-card {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 16px 20px;
      transition: border-color 0.15s;
    }

    .result-card.dismissed {
      opacity: 0.5;
    }

    .result-card.fixed {
      border-color: #34a853;
    }

    .result-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .result-title {
      font-size: 14px;
      font-weight: 500;
      color: #202124;
      flex: 1;
      word-break: break-word;
    }

    .result-url {
      font-size: 12px;
      color: #1a73e8;
      word-break: break-all;
      margin-bottom: 6px;
      text-decoration: none;
    }

    .result-url:hover { text-decoration: underline; }

    .result-meta {
      font-size: 12px;
      color: #80868b;
      margin-bottom: 10px;
    }

    .result-new-url {
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 10px;
    }

    .result-new-url strong { color: #202124; }

    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── Status badges ── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-dead       { background: #fce8e6; color: #c5221f; }
    .badge-domain_gone { background: #fcdddd; color: #a50e0e; }
    .badge-redirect   { background: #fef3c7; color: #92400e; }
    .badge-stale      { background: #e8f0fe; color: #1967d2; }
    .badge-title_changed { background: #e6f4ea; color: #137333; }
    .badge-ok         { background: #f1f3f4; color: #5f6368; }
    .badge-fixed      { background: #e6f4ea; color: #137333; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }

    .btn-primary:hover { background: #1557b0; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      background: #fff;
      color: #5f6368;
      border: 1px solid #dadce0;
    }

    .btn-secondary:hover { background: #f8f9fa; color: #202124; }

    .btn-danger {
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #f28b82;
    }

    .btn-danger:hover { background: #f28b82; color: #fff; }

    .btn-warn {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    .btn-warn:hover { background: #fcd34d; }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    .btn-ghost {
      background: transparent;
      color: #80868b;
      border: 1px solid transparent;
      padding: 5px 10px;
    }

    .btn-ghost:hover { color: #5f6368; border-color: #dadce0; }

    /* ── Cards (settings) ── */
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dadce0;
      margin-bottom: 16px;
    }

    .card-header {
      padding: 16px 24px;
      border-bottom: 1px solid #dadce0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: #202124;
    }

    .card-body { padding: 24px; }

    .badge-opt {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      background: #e6f4ea;
      color: #137333;
    }

    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-group-inline { margin-bottom: 16px; }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #202124;
    }

    .toggle-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #1a73e8;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #202124;
      margin-bottom: 8px;
    }

    .form-hint {
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 8px;
    }

    .interval-tabs {
      display: flex;
      border: 1px solid #dadce0;
      border-radius: 4px;
      overflow: hidden;
      width: fit-content;
    }

    .interval-tab {
      padding: 8px 20px;
      border: none;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      color: #5f6368;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .interval-tab:not(:last-child) { border-right: 1px solid #dadce0; }

    .interval-tab.active {
      background: #1a73e8;
      color: #fff;
    }

    .interval-tab:not(.active):hover { background: #f8f9fa; color: #202124; }

    .stale-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stale-input {
      width: 100px;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      color: #202124;
    }

    .stale-input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
    }

    .stale-unit { font-size: 13px; color: #5f6368; }

    .save-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      align-items: center;
    }

    .status-msg {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 4px;
      display: none;
    }

    .status-msg.visible { display: inline-block; }
    .status-msg.success { background: #e6f4ea; color: #137333; }
    .status-msg.error   { background: #fce8e6; color: #c5221f; }

    /* ── Empty / no-results state ── */
    .empty-state {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 40px 24px;
      text-align: center;
      color: #5f6368;
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p { font-size: 14px; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #1a73e8;
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page">

    <a href="options.html" class="back-link">&#8592; Settings</a>

    <div class="page-header">
      <div>
        <h1>Bookmark Health Check</h1>
        <p>Scan your bookmarks for dead links, redirects, stale content, and disappeared domains.</p>
      </div>
      <button class="btn btn-primary" id="runBtn">Run Health Check</button>
    </div>

    <!-- Progress -->
    <div class="progress-card" id="progressSection" style="display:none">
      <div class="progress-label">
        Checking bookmarks&hellip; <span id="progressCurrent">0</span> / <span id="progressTotal">0</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid">
      <div class="summary-card active" data-filter="issues">
        <div class="summary-number" id="sumIssues">–</div>
        <div class="summary-label">Issues</div>
      </div>
      <div class="summary-card" data-filter="dead">
        <div class="summary-number" id="sumDead">–</div>
        <div class="summary-label">Dead Links</div>
      </div>
      <div class="summary-card" data-filter="domain_gone">
        <div class="summary-number" id="sumDomainGone">–</div>
        <div class="summary-label">Domain Gone</div>
      </div>
      <div class="summary-card" data-filter="redirect">
        <div class="summary-number" id="sumRedirected">–</div>
        <div class="summary-label">Redirects</div>
      </div>
      <div class="summary-card" data-filter="stale">
        <div class="summary-number" id="sumStale">–</div>
        <div class="summary-label">Stale</div>
      </div>
      <div class="summary-card" data-filter="title_changed">
        <div class="summary-number" id="sumTitleChanged">–</div>
        <div class="summary-label">Title Changed</div>
      </div>
      <div class="summary-card" data-filter="ok">
        <div class="summary-number" id="sumOk">–</div>
        <div class="summary-label">Healthy</div>
      </div>
    </div>

    <div class="last-run" id="lastRunLabel"></div>

    <!-- Bulk actions -->
    <div class="bulk-bar" id="bulkBar" style="display:none">
      <span class="bulk-bar-label">Bulk actions:</span>
      <button class="btn btn-sm btn-danger" id="bulkDeleteDead" style="display:none">Delete all dead</button>
      <button class="btn btn-sm btn-warn" id="bulkFixRedirects" style="display:none">Fix all redirects</button>
      <button class="btn btn-sm btn-secondary" id="bulkDismissStale" style="display:none">Dismiss all stale</button>
    </div>

    <!-- Results list -->
    <div id="resultsList"></div>

      </div>
  <script src="health-check.js"></script>
</body>
</html>
